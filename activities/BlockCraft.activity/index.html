<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="utf-8" />
<title>BlockCraft Activity</title>
<meta name="viewport" content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width, viewport-fit=cover"/>
<link rel="stylesheet" media="not screen and (device-width: 1200px) and (device-height: 900px)"
	href="lib/sugar-web/graphics/css/sugar-96dpi.css">
<link rel="stylesheet" media="screen and (device-width: 1200px) and (device-height: 900px)"
	href="lib/sugar-web/graphics/css/sugar-200dpi.css">
<link rel="stylesheet" href="css/activity.css">
<link rel="stylesheet" href="css/introjs.css">
<script src="lib/intro.js"></script>
<script>if (typeof module === 'object') { window.module = module; module = undefined; }</script>
<script>if (window.module) module = window.module;</script>
<script data-main="js/loader" src="lib/require.js"></script>
<script type="text/javascript" src="../../cordova.js"></script>
</head>

<body>
<div id="main-toolbar" class="toolbar">
  <button class="toolbutton" id="activity-button" title="BlockCraft" aria-label="BlockCraft activity"></button>
  <button class="toolbutton" id="mode-button" title="Level Mode" aria-label="Switch to Level Mode"></button>
  <button class="toolbutton" id="undo-button" title="Undo" aria-label="Undo">↩</button>
  <button class="toolbutton" id="redo-button" title="Redo" aria-label="Redo">↪</button>
  <button class="toolbutton" id="clear-button" title="Clear" aria-label="Clear">Clear</button>
  <button class="toolbutton pull-right" id="help-button" title="Tutorial" aria-label="Start tutorial">?</button>
  <button class="toolbutton pull-right" id="stop-button" title="Stop" aria-label="Stop"></button>
</div>

<div id="toast-container" role="status" aria-live="polite"></div>

<div id="level-panel" class="hidden" aria-hidden="true">
  <div class="level-title" id="level-title">Choose a Level</div>
  <div id="level-list" role="list"></div>
  <button class="toolbutton" id="back-to-build" aria-label="Back to Free Build">Back to Free Build</button>
</div>

<div id="blockcraft-container">
  <div id="block-palette" role="toolbar">
    <div class="palette-title" id="palette-title">Blocks</div>
    <div id="block-types" role="group">
      <div class="block-type" data-type="cube" data-color="#E74C3C" title="Red cube" role="button" tabindex="0"></div>
      <div class="block-type" data-type="cube" data-color="#3498DB" title="Blue cube" role="button" tabindex="0"></div>
      <div class="block-type" data-type="cube" data-color="#2ECC71" title="Green cube" role="button" tabindex="0"></div>
      <div class="block-type" data-type="cube" data-color="#F39C12" title="Orange cube" role="button" tabindex="0"></div>
      <div class="block-type" data-type="cube" data-color="#9B59B6" title="Purple cube" role="button" tabindex="0"></div>
      <div class="block-type" data-type="cube" data-color="#1ABC9C" title="Teal cube" role="button" tabindex="0"></div>
      <div class="block-type block-type-slope" data-type="slope" data-color="#E67E22" title="Slope" role="button" tabindex="0"></div>
      <div class="block-type block-type-wheel" data-type="wheel" data-color="#34495E" title="Wheel" role="button" tabindex="0"></div>
      <div class="block-type" id="eraser" data-type="erase" title="Delete block" role="button" tabindex="0">✕</div>
    </div>
  </div>
  <div id="build-area">
    <div id="level-info" class="hidden" aria-live="polite"></div>
    <div id="grid" role="grid" aria-label="Build area" tabindex="0"></div>
  </div>
  <div id="rotation-controls">
    <button class="toolbutton" id="rotate-left" title="Rotate left" aria-label="Rotate selected block left">↶</button>
    <button class="toolbutton" id="rotate-right" title="Rotate right" aria-label="Rotate selected block right">↷</button>
    <button class="toolbutton hidden" id="check-level" title="Check solution" aria-label="Check level solution">Check</button>
    <span id="selected-info" class="sr-only-visible"></span>
    <span id="level-progress" aria-live="polite"></span>
  </div>
</div>
</body>

</html>
