<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd" [
	<!ENTITY stroke_color "#010101">
	<!ENTITY fill_color "#FFFFFF">
]>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" width="75px" height="75px" viewBox="0 0 75 75">
<g fill="&fill_color;" stroke="&fill_color;" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Constellation Lines -->
    <path fill="none" d="M 12,60 L 25,45 L 45,50 L 55,30 L 70,25 L 60,10 L 45,20 L 55,30" />
    
    <!-- Stars (Dots) -->
    <circle cx="12" cy="60" r="3" />
    <circle cx="25" cy="45" r="4" />
    <circle cx="45" cy="50" r="3" />
    <circle cx="55" cy="30" r="4.5" />
    <circle cx="70" cy="25" r="3" />
    <circle cx="60" cy="10" r="4" />
    <circle cx="45" cy="20" r="3" />

    <!-- Tiny decorative stars in the background -->
    <circle cx="15" cy="20" r="1.5" />
    <circle cx="30" cy="15" r="1" />
    <circle cx="65" cy="55" r="1.5" />
    <circle cx="25" cy="70" r="1" />
    
    <!-- The Numbers for the main path -->
    <text x="5" y="72" font-size="12" font-family="monospace" font-weight="bold" fill="&fill_color;" stroke="none">1</text>
    <text x="12" y="42" font-size="12" font-family="monospace" font-weight="bold" fill="&fill_color;" stroke="none">2</text>
    <text x="35" y="62" font-size="12" font-family="monospace" font-weight="bold" fill="&fill_color;" stroke="none">3</text>
    <text x="42" y="38" font-size="12" font-family="monospace" font-weight="bold" fill="&fill_color;" stroke="none">4</text>
    <text x="70" y="38" font-size="12" font-family="monospace" font-weight="bold" fill="&fill_color;" stroke="none">5</text>
    <text x="55" y="8" font-size="12" font-family="monospace" font-weight="bold" fill="&fill_color;" stroke="none">6</text>
    <text x="32" y="22" font-size="12" font-family="monospace" font-weight="bold" fill="&fill_color;" stroke="none">7</text>
</g>
</svg>
