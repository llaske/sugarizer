  <!-- V for Voltage -->
  <text x="10" y="26" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">V</text>
  <!-- I for Current -->
  <text x="32" y="26" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">I</text>
  <!-- Lightning bolt icon -->
  <path d="M27 30 L30 35 L26 35 L29 42 L24 36 L28 36 L25 30 Z" fill="white" stroke="white" stroke-width="0.5"/>
