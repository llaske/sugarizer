<div class="preset-palette">
	<button class="preset-button" id="preset-simple-loop" title="Simple Loop">
		<svg class="preset-icon" width="28" height="28" viewBox="0 0 28 28">
			<rect x="4" y="4" width="20" height="20" rx="3" style="fill:none;stroke:#4CAF50;stroke-width:2"/>
			<circle cx="14" cy="19" r="3" style="fill:#FFD54F;stroke:#FFD54F;stroke-width:1"/>
		</svg>
		<span class="preset-label">Simple Loop</span>
	</button>
	<button class="preset-button" id="preset-switched" title="Switched Circuit">
		<svg class="preset-icon" width="28" height="28" viewBox="0 0 28 28">
			<rect x="4" y="4" width="20" height="20" rx="3" style="fill:none;stroke:#4CAF50;stroke-width:2"/>
			<circle cx="19" cy="19" r="3" style="fill:#FFD54F;stroke:#FFD54F;stroke-width:1"/>
			<line x1="7" y1="10" x2="14" y2="8" style="stroke:#FF9800;stroke-width:2;stroke-linecap:round"/>
		</svg>
		<span class="preset-label">Switched Circuit</span>
	</button>
	<button class="preset-button" id="preset-series" title="Two Bulbs in Series">
		<svg class="preset-icon" width="28" height="28" viewBox="0 0 28 28">
			<rect x="4" y="4" width="20" height="20" rx="3" style="fill:none;stroke:#4CAF50;stroke-width:2"/>
			<circle cx="19" cy="10" r="3" style="fill:#FFD54F;stroke:#FFD54F;stroke-width:1"/>
			<circle cx="19" cy="19" r="3" style="fill:#FFD54F;stroke:#FFD54F;stroke-width:1"/>
		</svg>
		<span class="preset-label">Two Bulbs in Series</span>
	</button>
	<button class="preset-button" id="preset-parallel" title="Two Bulbs in Parallel">
		<svg class="preset-icon" width="28" height="28" viewBox="0 0 28 28">
			<path d="M6 6 L6 22 M6 6 L22 6 L22 14 M6 22 L22 22 L22 14" style="fill:none;stroke:#4CAF50;stroke-width:2;stroke-linejoin:round"/>
			<circle cx="22" cy="9" r="3" style="fill:#FFD54F;stroke:#FFD54F;stroke-width:1"/>
			<circle cx="22" cy="19" r="3" style="fill:#FFD54F;stroke:#FFD54F;stroke-width:1"/>
		</svg>
		<span class="preset-label">Two Bulbs in Parallel</span>
	</button>
	<button class="preset-button" id="preset-switch-parallel" title="Switch-Controlled Parallel">
		<svg class="preset-icon" width="28" height="28" viewBox="0 0 28 28">
			<path d="M4 6 L4 22 M4 6 L14 6 M4 22 L14 22" style="fill:none;stroke:#4CAF50;stroke-width:2;stroke-linejoin:round"/>
			<line x1="14" y1="6" x2="19" y2="5" style="stroke:#FF9800;stroke-width:2;stroke-linecap:round"/>
			<line x1="14" y1="22" x2="19" y2="21" style="stroke:#FF9800;stroke-width:2;stroke-linecap:round"/>
			<circle cx="23" cy="6" r="3" style="fill:#FFD54F;stroke:#FFD54F;stroke-width:1"/>
			<circle cx="23" cy="22" r="3" style="fill:#FFD54F;stroke:#FFD54F;stroke-width:1"/>
		</svg>
		<span class="preset-label">Switch-Controlled Parallel</span>
	</button>
	<button class="preset-button" id="preset-series-chain" title="Three Bulbs with Switch">
		<svg class="preset-icon" width="28" height="28" viewBox="0 0 28 28">
			<path d="M4 14 L4 6 L14 6 M14 6 L24 6 L24 14 M24 14 L24 22 L14 22 L4 22 L4 14" style="fill:none;stroke:#4CAF50;stroke-width:2;stroke-linejoin:round"/>
			<circle cx="18" cy="6" r="2.5" style="fill:#FFD54F;stroke:#FFD54F;stroke-width:1"/>
			<circle cx="24" cy="14" r="2.5" style="fill:#FFD54F;stroke:#FFD54F;stroke-width:1"/>
			<circle cx="14" cy="22" r="2.5" style="fill:#FFD54F;stroke:#FFD54F;stroke-width:1"/>
		</svg>
		<span class="preset-label">Three Bulbs with Switch</span>
	</button>
</div>
