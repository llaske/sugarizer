<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>ColorLab Activity</title>
    <meta name="viewport"
        content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width, viewport-fit=cover" />
    <link rel="stylesheet" media="not screen and (device-width: 1200px) and (device-height: 900px)"
        href="lib/sugar-web/graphics/css/sugar-96dpi.css">
    <link rel="stylesheet" media="screen and (device-width: 1200px) and (device-height: 900px)"
        href="lib/sugar-web/graphics/css/sugar-200dpi.css">
    <link rel="stylesheet" href="css/libnotify.css?v=4">
    <link rel="stylesheet" href="css/activity.css?v=7">
    <link rel="stylesheet" href="css/style.css?v=7">
    <script src="lib/intro.js"></script>
    <script data-main="js/loader" src="lib/require.js"></script>
    <script type="text/javascript" src="../../cordova.js"></script>
</head>

<body>
    <!-- Toolbar -->
    <div id="main-toolbar" class="toolbar">
        <button class="toolbutton" id="activity-button" title="Color Lab"></button>
        <button class="toolbutton" id="network-button" title="Network"></button>
        <button class="toolbutton" id="mode-button" title="Mode"></button>
        <button class="toolbutton" id="harmony-dropdown-button" title="Harmony Types"
            style="display: none; background-image: url(icons/harmony.svg);"></button>
        <button id="cycle-harmony-button" class="toolbutton" title="Cycle Harmony Mode"
            style="display: none; background-image: url(icons/harmony.svg);"></button>
        <button class="toolbutton" id="challenge-difficulty-button" title="Difficulty"
            style="display: none; background-image: url(icons/difficulty.svg);"></button>
        <button class="toolbutton" id="reset-toolbar-button" title="Reset"></button>

        <button class="toolbutton pull-right" id="help-button" title="Help"></button>
        <button class="toolbutton pull-right" id="fullscreen-button" title="Fullscreen"></button>
        <button class="toolbutton pull-right" id="stop-button" title="Stop"></button>
    </div>

    <!-- MODE DROPDOWN -->
    <div id="mode-dropdown" class="palette">
        <div id="mode-options">
            <!-- Mode options will be generated by JS -->
        </div>
    </div>

    <!-- DIFFICULTY DROPDOWN -->
    <div id="difficulty-dropdown" class="palette">
        <div id="difficulty-options">
            <!-- Difficulty options will be generated by JS -->
        </div>
    </div>


    <div id="canvas">
        <div id="canvas-content" style="width: 100%; height: 100%; display: flex; flex-direction: column;">
            <!-- FREE PAINT MODE -->
            <div id="free-mode" class="mode-container">
                <div id="main-workspace">
                    <div id="bowl-container">
                        <div id="color-name">White</div>
                        <div id="bowl-center-wrapper">
                            <div id="color-wheel-ring">
                                <svg width="100%" height="100%" viewBox="0 0 380 380"
                                    style="transform: rotate(-90deg); overflow: visible;" id="ring-svg">
                                    <!-- Ring segments will be generated by JS -->
                                </svg>
                            </div>
                            <div id="mixing-bowl" style="background-color: #ffffff"></div>
                        </div>
                    </div>
                    <div id="sliders-grid">
                        <div class="slider-group group-red">
                            <button class="adjust-button minus" id="red-minus">-</button>
                            <input type="range" min="0" max="255" value="255" id="red-slider">
                            <button class="adjust-button plus" id="red-plus">+</button>
                            <span class="slider-val" id="red-val">255</span>
                        </div>
                        <div class="slider-group group-green">
                            <button class="adjust-button minus" id="green-minus">-</button>
                            <input type="range" min="0" max="255" value="255" id="green-slider">
                            <button class="adjust-button plus" id="green-plus">+</button>
                            <span class="slider-val" id="green-val">255</span>
                        </div>
                        <div class="slider-group group-blue">
                            <button class="adjust-button minus" id="blue-minus">-</button>
                            <input type="range" min="0" max="255" value="255" id="blue-slider">
                            <button class="adjust-button plus" id="blue-plus">+</button>
                            <span class="slider-val" id="blue-val">255</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- HARMONY MODE -->
            <div id="harmony-mode" class="mode-container"
                style="display: none; width: 100%; height: 100%; overflow: hidden; position: relative;">
                <div id="harmony-workspace"
                    style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; width: 100%;">
                    <div id="harmony-wheel-container"
                        style="display: flex; flex-direction: column; align-items: center;">
                        <div id="harmony-name-display"
                            style="font-size: 24px; font-weight: bold; margin-bottom: 20px; color: #ffffff;">
                            Complementary</div>
                        <div id="harmony-wheel">
                            <div id="lightnessGradient">
                                <div id="lightnessInterstitial">
                                    <div id="lightnessTrack">
                                        <div id="lightnessThumb"></div>
                                    </div>
                                </div>
                                <div class="color-wheel" id="harmony-wheel-inner">
                                    <!-- Markers will be generated by JS -->
                                </div>
                            </div>
                        </div>
                        <div id="harmony-swatches">
                            <!-- Swatches will be generated by JS -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- CHALLENGE MODE -->
            <div id="challenge-mode" class="mode-container" style="display: none;">
                <div id="bowls-area">
                    <div class="bowl-wrapper" id="user-wrapper">
                        <div class="bowl-label" id="label-my-color">My Color</div>
                        <div class="bowl-container">
                            <svg class="progress-ring" width="100%" height="100%" viewBox="0 0 400 400">
                                <circle id="challenge-progress-circle" class="progress-ring__circle" stroke-width="10"
                                    fill="transparent" r="190" cx="200" cy="200" />
                            </svg>
                            <div id="user-bowl" class="bowl" style="background-color: #ffffff"></div>
                        </div>
                    </div>

                    <div id="divider-line"></div>

                    <div class="bowl-wrapper" id="target-wrapper">
                        <div class="bowl-label" id="label-target">Target</div>
                        <div id="target-bowl" class="bowl"></div>
                    </div>
                </div>

                <div id="controls-area">
                    <!-- Red Slider -->
                    <div class="slider-group group-red">
                        <button class="adjust-button minus" id="challenge-red-minus">-</button>
                        <input type="range" min="0" max="255" value="255" id="challenge-red-slider">
                        <button class="adjust-button plus" id="challenge-red-plus">+</button>
                        <span class="slider-val" id="challenge-red-val">255</span>
                    </div>

                    <!-- Green Slider -->
                    <div class="slider-group group-green">
                        <button class="adjust-button minus" id="challenge-green-minus">-</button>
                        <input type="range" min="0" max="255" value="255" id="challenge-green-slider">
                        <button class="adjust-button plus" id="challenge-green-plus">+</button>
                        <span class="slider-val" id="challenge-green-val">255</span>
                    </div>

                    <!-- Blue Slider -->
                    <div class="slider-group group-blue">
                        <button class="adjust-button minus" id="challenge-blue-minus">-</button>
                        <input type="range" min="0" max="255" value="255" id="challenge-blue-slider">
                        <button class="adjust-button plus" id="challenge-blue-plus">+</button>
                        <span class="slider-val" id="challenge-blue-val">255</span>
                    </div>
                </div>

                <div id="win-overlay" class="hidden">
                    <div class="sugarizer-modal">
                        <div class="star-burst">
                            <div class="star s1"></div>
                            <div class="star s2"></div>
                            <div class="star s3"></div>
                            <div class="star s4"></div>
                            <div class="star s5"></div>
                            <div class="star s6"></div>
                            <div class="star s7"></div>
                            <div class="star s8"></div>
                            <div class="star s9"></div>
                            <div class="star s10"></div>
                            <div class="star s11"></div>
                            <div class="star s12"></div>
                        </div>
                        <div class="modal-content">
                            <h1 id="label-you-won">You Won!</h1>
                            <div class="checkmark">✓</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <button id="unfullscreen-button" class="toolbar-item" title="Exit Fullscreen"
        style="display: none; position: absolute; top: 0px; right: 65px; z-index: 1000; background-image: url(icons/view-return.svg); background-size: contain; background-repeat: no-repeat; background-position: center; border: none; background-color: transparent; width: 47px; height: 47px;">
    </button>
</body>

</html>
