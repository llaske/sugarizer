<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 55 55" width="40" height="40">
    <defs>
        <linearGradient id="wheel-red-orange" x1="50%" y1="0%" x2="100%" y2="50%">
            <stop offset="0%" stop-color="#FF0000" />
            <stop offset="100%" stop-color="#FF8000" />
        </linearGradient>
        <linearGradient id="wheel-orange-yellow" x1="100%" y1="50%" x2="50%" y2="100%">
            <stop offset="0%" stop-color="#FF8000" />
            <stop offset="100%" stop-color="#FFFF00" />
        </linearGradient>
        <linearGradient id="wheel-yellow-green" x1="50%" y1="100%" x2="0%" y2="50%">
            <stop offset="0%" stop-color="#FFFF00" />
            <stop offset="100%" stop-color="#00FF00" />
        </linearGradient>
        <linearGradient id="wheel-green-cyan" x1="0%" y1="50%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#00FF00" />
            <stop offset="100%" stop-color="#00FFFF" />
        </linearGradient>
        <linearGradient id="wheel-cyan-blue" x1="0%" y1="0%" x2="50%" y2="0%">
            <stop offset="0%" stop-color="#00FFFF" />
            <stop offset="100%" stop-color="#0000FF" />
        </linearGradient>
        <linearGradient id="wheel-blue-magenta" x1="50%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#0000FF" />
            <stop offset="100%" stop-color="#FF00FF" />
        </linearGradient>
        <linearGradient id="wheel-magenta-red" x1="100%" y1="0%" x2="50%" y2="0%">
            <stop offset="0%" stop-color="#FF00FF" />
            <stop offset="100%" stop-color="#FF0000" />
        </linearGradient>
    </defs>

    <!-- Outer stroke for visibility -->
    <circle cx="27.5" cy="27.5" r="22" stroke="#ffffff" stroke-width="2" fill="none" />

    <!-- 6 Segments for color wheel -->
    <!-- We're using stroke-dasharray to draw arcs. Circumference = 2 * pi * 18 = 113.1 -->
    <!-- Each segment = 113.1 / 6 = 18.85 -->
    <circle cx="27.5" cy="27.5" r="18" fill="none" stroke="url(#wheel-red-orange)" stroke-width="6" stroke-dasharray="18.85 94.25" stroke-dashoffset="0" />
    <circle cx="27.5" cy="27.5" r="18" fill="none" stroke="url(#wheel-orange-yellow)" stroke-width="6" stroke-dasharray="18.85 94.25" stroke-dashoffset="-18.85" />
    <circle cx="27.5" cy="27.5" r="18" fill="none" stroke="url(#wheel-yellow-green)" stroke-width="6" stroke-dasharray="18.85 94.25" stroke-dashoffset="-37.7" />
    <circle cx="27.5" cy="27.5" r="18" fill="none" stroke="url(#wheel-green-cyan)" stroke-width="6" stroke-dasharray="18.85 94.25" stroke-dashoffset="-56.55" />
    <circle cx="27.5" cy="27.5" r="18" fill="none" stroke="url(#wheel-cyan-blue)" stroke-width="6" stroke-dasharray="18.85 94.25" stroke-dashoffset="-75.4" />
    <circle cx="27.5" cy="27.5" r="18" fill="none" stroke="url(#wheel-blue-magenta)" stroke-width="6" stroke-dasharray="18.85 94.25" stroke-dashoffset="-94.25" />
    
    <!-- Central dot and white interior -->
    <circle cx="27.5" cy="27.5" r="15" fill="#fcfcfc" />
    <circle cx="27.5" cy="27.5" r="4" fill="#333333" />
</svg>
